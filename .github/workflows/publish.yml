name: Build and Publish to npm

on:
  push:
    branches:
      - '**'
    tags:
      - "v*"
  pull_request:

permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies (handles no lockfile)
        run: |
          if [[ -f package-lock.json || -f npm-shrinkwrap.json ]]; then
            npm ci
          elif [[ -f yarn.lock ]]; then
            corepack enable
            yarn install --frozen-lockfile
          elif [[ -f pnpm-lock.yaml ]]; then
            corepack enable
            pnpm install --frozen-lockfile
          else
            npm install
          fi

      - name: Build
        run: npm run build --if-present

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Install dependencies (handles no lockfile)
        run: |
          if [[ -f package-lock.json || -f npm-shrinkwrap.json ]]; then
            npm ci
          elif [[ -f yarn.lock ]]; then
            corepack enable
            yarn install --frozen-lockfile
          elif [[ -f pnpm-lock.yaml ]]; then
            corepack enable
            pnpm install --frozen-lockfile
          else
            npm install
          fi

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # fail if "private": true
          node -e "if(require('./package.json').private){process.exit(1)}"

          # add --access public for first publish of scoped public pkgs
          PKG_NAME=$(node -p "require('./package.json').name")
          ACCESS_FLAG=""
          if [[ "$PKG_NAME" == @*/* ]]; then ACCESS_FLAG="--access public"; fi

          npm publish $ACCESS_FLAG --provenance
